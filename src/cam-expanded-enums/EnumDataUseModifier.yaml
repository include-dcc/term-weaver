id: https://includedcc.org/common-access-model/EnumDataUseModifier
name: EnumDataUseModifier
enums:
  EnumDataUseModifier:
    title: Data Use Modifier
    description: Data Use Ontology (DUO) terms for data use modifiers.
    reachable_from:
      source_ontology: bioregistry:duo
      source_nodes:
      - DUO:0000017
      is_direct: false
      relationship_types:
      - rdfs:subClassOf
    permissible_values:
      DUO:0000026:
        text: DUO:0000026
        description: This data use modifier indicates that use is limited to use
          by approved users.
        meaning: DUO:0000026
        title: user specific restriction
      DUO:0000015:
        text: DUO:0000015
        description: This data use modifier indicates that use does not allow 
          methods development research (e.g., development of software or 
          algorithms).
        meaning: DUO:0000015
        title: no general methods research
      DUO:0000012:
        text: DUO:0000012
        description: This data use modifier indicates that use is limited to 
          studies of a certain research type.
        meaning: DUO:0000012
        title: research specific restrictions
      DUO:0000043:
        text: DUO:0000043
        description: This data use modifier indicates that use is allowed for 
          clinical use and care.
        meaning: DUO:0000043
        title: clinical care use
      DUO:0000029:
        text: DUO:0000029
        description: This data use modifier indicates that the requestor must 
          return derived/enriched data to the database/resource.
        meaning: DUO:0000029
        title: return to database or resource
      DUO:0000024:
        text: DUO:0000024
        description: This data use modifier indicates that requestor agrees not 
          to publish results of studies until a specific date.
        meaning: DUO:0000024
        title: publication moratorium
      DUO:0000045:
        text: DUO:0000045
        description: This data use modifier indicates that use of the data is 
          limited to not-for-profit organizations.
        meaning: DUO:0000045
        title: not for profit organisation use only
      DUO:0000018:
        text: DUO:0000018
        description: This data use modifier indicates that use of the data is 
          limited to not-for-profit organizations and not-for-profit use, 
          non-commercial use.
        meaning: DUO:0000018
        title: not for profit, non commercial use only
      DUO:0000028:
        text: DUO:0000028
        description: This data use modifier indicates that use is limited to use
          within an approved institution.
        meaning: DUO:0000028
        title: institution specific restriction
      DUO:0000019:
        text: DUO:0000019
        description: This data use modifier indicates that requestor agrees to 
          make results of studies using the data available to the larger 
          scientific community.
        meaning: DUO:0000019
        title: publication required
      DUO:0000016:
        text: DUO:0000016
        description: This data use modifier indicates that use is limited to 
          genetic studies only (i.e., studies that include genotype research 
          alone or both genotype and phenotype research, but not phenotype 
          research exclusively)
        meaning: DUO:0000016
        title: genetic studies only
      DUO:0000021:
        text: DUO:0000021
        description: This data use modifier indicates that the requestor must 
          provide documentation of local IRB/ERB approval.
        meaning: DUO:0000021
        title: ethics approval required
      DUO:0000022:
        text: DUO:0000022
        description: This data use modifier indicates that use is limited to 
          within a specific geographic region.
        meaning: DUO:0000022
        title: geographical restriction
      DUO:0000020:
        text: DUO:0000020
        description: This data use modifier indicates that the requestor must 
          agree to collaboration with the primary study investigator(s).
        meaning: DUO:0000020
        title: collaboration required
      DUO:0000027:
        text: DUO:0000027
        description: This data use modifier indicates that use is limited to use
          within an approved project.
        meaning: DUO:0000027
        title: project specific restriction
      DUO:0000046:
        text: DUO:0000046
        description: This data use modifier indicates that use of the data is 
          limited to not-for-profit use.
        meaning: DUO:0000046
        title: non-commercial use only
      DUO:00000044:
        text: DUO:00000044
        description: This data use modifier indicates use for purposes of 
          population, origin, or ancestry research is prohibited.
        meaning: DUO:00000044
        title: population origins or ancestry research prohibited
      DUO:0000025:
        text: DUO:0000025
        description: This data use modifier indicates that use is approved for a
          specific number of months.
        meaning: DUO:0000025
        title: time limit on use
