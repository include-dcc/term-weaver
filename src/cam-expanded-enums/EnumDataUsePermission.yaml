id: https://includedcc.org/common-access-model/EnumDataUsePermission
name: EnumDataUsePermission
enums:
  EnumDataUsePermission:
    title: Data Use Permission
    description: Data Use Ontology (DUO) terms for data use permissions.
    reachable_from:
      source_ontology: bioregistry:duo
      source_nodes:
      - DUO:0000001
      is_direct: false
      relationship_types:
      - rdfs:subClassOf
    permissible_values:
      DUO:0000042:
        text: DUO:0000042
        description: This data use permission indicates that use is allowed for 
          general research use for any research purpose.
        meaning: DUO:0000042
        title: general research use
      DUO:0000006:
        text: DUO:0000006
        description: This data use permission indicates that use is allowed for 
          health/medical/biomedical purposes; does not include the study of 
          population origins or ancestry.
        meaning: DUO:0000006
        title: health or medical or biomedical research
      DUO:0000007:
        text: DUO:0000007
        description: This data use permission indicates that use is allowed 
          provided it is related to the specified disease.
        meaning: DUO:0000007
        title: disease specific research
      DUO:0000011:
        text: DUO:0000011
        description: This data use permission indicates that use of the data is 
          limited to the study of population origins or ancestry.
        meaning: DUO:0000011
        title: population origins or ancestry research only
      DUO:0000004:
        text: DUO:0000004
        description: This data use permission indicates there is no restriction 
          on use.
        meaning: DUO:0000004
        title: no restriction
